<!doctype html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Эволюция административной сетки — тестовый просмотрщик</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQWsd1J0oEG5wQHZA4C6PhX2HVEVrwM=" crossorigin="" />
  <link rel="stylesheet" href="css/styles.css?v=2" />
</head>
<body>
  <div id="app">
    <main id="mapWrap">
      <div id="map"></div>
      <section id="timelineBar" class="glass-card" aria-label="Таймслайдер слоёв">
        <div class="timeline-head">
          <span>Активный срез</span>
          <b id="activeTimeLabel">—</b>
        </div>
        <input id="timeSlider" type="range" min="0" max="0" step="1" value="0" aria-label="Сдвиг по срезам" />
        <div class="timeline-footer">
          <button id="prevBtn" type="button">← раньше</button>
          <button id="nextBtn" type="button">позже →</button>
        </div>
      </section>
    </main>

    <aside id="leftPanel" class="panel floating-panel">
      <div class="eyebrow">тестовый просмотрщик · v2</div>
      <h1>Эволюция административной сетки</h1>
      <div class="year-card"><span>Слой</span><b id="layerYearBig">—</b></div>

      <label class="control-label" for="categoryFilter">Категория слоёв</label>
      <select id="categoryFilter">
        <option value="admin" selected>Административные границы</option>
        <option value="all">Все слои</option>
        <option value="stats">Статистика / население</option>
        <option value="settlements">Остроги / пункты</option>
        <option value="buffer">Буферы</option>
        <option value="special">Спец. ведомства</option>
        <option value="points">Точечные слои</option>
      </select>

      <label class="control-label" for="modeSelect">Окраска карты</label>
      <select id="modeSelect">
        <option value="parent" selected>Верхнеуровневая принадлежность</option>
        <option value="unit_type">Тип единицы</option>
        <option value="status">Статус / неопределённость</option>
        <option value="population">Население</option>
        <option value="confidence">Качество / уверенность</option>
      </select>

      <label class="control-label" for="statusFilter">Фильтр статуса</label>
      <select id="statusFilter">
        <option value="all" selected>Все объекты</option>
        <option value="uncertain">Только спорные / неясные / неустойчивые</option>
        <option value="normal">Только обычные</option>
      </select>

      <div class="toggles">
        <label><input type="checkbox" id="showPrevious" checked /> Предыдущий срез пунктиром</label>
        <label><input type="checkbox" id="showHatch" checked /> Штриховка спорных зон</label>
        <label><input type="checkbox" id="showLabels" /> Подписи объектов</label>
        <label><input type="checkbox" id="autoFit" checked /> Автомасштаб при смене слоя</label>
      </div>

      <div class="button-row">
        <button id="fitLayerBtn" type="button">Приблизить слой</button>
        <button id="downloadBtn" type="button">Скачать GeoJSON</button>
      </div>

      <h2 class="section-title">Срезы таймлайна</h2>
      <div id="snapshotRadios" class="snapshot-list"></div>
    </aside>

    <aside id="rightPanel" class="panel floating-panel">
      <h2>Текущий слой</h2>
      <section id="layerInfo" class="feature-info muted">Загрузка…</section>

      <h2 class="section-title">Объект</h2>
      <section id="featureInfo" class="feature-info muted">Кликни по объекту на карте.</section>

      <h2 class="section-title">Спорные / неясные зоны</h2>
      <section id="uncertaintyBox" class="feature-info muted">—</section>

      <h2 class="section-title">Структура атрибутов</h2>
      <section id="schemaBox" class="feature-info attr-panel muted">—</section>

      <h2 class="section-title">Таблица объектов</h2>
      <input id="tableSearch" class="search-input" type="search" placeholder="Фильтр по таблице…" />
      <section id="attributeTableBox" class="feature-info table-panel muted">—</section>
    </aside>
  </div>

  <div id="loading" class="loading">Загрузка слоя…</div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
