<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Исторические слои — простой просмотрщик</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQWsd1J0oEGx8v0QZ24A9Q54Zkb0H6M=" crossorigin="" onerror="this.remove()">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <aside id="leftPanel" class="panel">
      <div class="eyebrow">v4 · максимально простая сборка</div>
      <h1>Исторические административные слои</h1>
      <div id="status" class="status">Загрузка…</div>

      <label>Категория</label>
      <select id="categorySelect">
        <option value="admin" selected>Административные полигоны</option>
        <option value="all">Все слои</option>
        <option value="stats">Статистика</option>
        <option value="settlements">Остроги / пункты</option>
        <option value="buffer">Буферы</option>
        <option value="points">Точки</option>
      </select>

      <label>Активный слой</label>
      <select id="layerSelect"></select>

      <label>Окраска</label>
      <select id="modeSelect">
        <option value="category">Единый цвет слоя</option>
        <option value="parent" selected>По верхнему уровню / parent</option>
        <option value="type">По типу</option>
        <option value="uncertain">Спорные / неясные зоны</option>
      </select>

      <div class="checks">
        <label><input id="showWater" type="checkbox" checked> Океан + озёра без reservoirs</label>
        <label><input id="showRivers" type="checkbox" checked> Реки</label>
        <label><input id="showPrevious" type="checkbox"> Предыдущий срез пунктиром</label>
        <label><input id="showHatch" type="checkbox" checked> Штриховка спорных зон</label>
        <label><input id="showLabels" type="checkbox"> Постоянные подписи</label>
      </div>

      <div class="buttonRow">
        <button id="fitLayerBtn">К текущему слою</button>
        <button id="fitProjectBtn">К экстенту</button>
      </div>
      <button id="downloadBtn">Скачать активный GeoJSON</button>

      <h2>Таймслайдер</h2>
      <input id="timeSlider" type="range" min="0" max="0" value="0" step="1">
      <div class="buttonRow">
        <button id="prevBtn">← раньше</button>
        <button id="nextBtn">позже →</button>
      </div>
      <div id="radioList" class="radioList"></div>
    </aside>

    <aside id="rightPanel" class="panel">
      <h2>Слой</h2>
      <section id="layerInfo" class="box">—</section>

      <h2>Объект</h2>
      <section id="featureInfo" class="box muted">Кликни по полигону / объекту.</section>

      <h2>Поля</h2>
      <section id="schemaInfo" class="box scrollBox">—</section>

      <h2>Объекты</h2>
      <input id="tableSearch" class="search" placeholder="Фильтр по атрибутам…">
      <section id="tableBox" class="box scrollBox">—</section>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
